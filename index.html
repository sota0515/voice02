<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dify Voice App</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; background-color: #e0f2f7; display: flex; flex-direction: column; height: 100vh; }
    #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .user-msg { align-self: flex-end; background-color: #007bff; color: white; }
    .ai-msg { align-self: flex-start; background-color: white; border: 1px solid #b3e5fc; }
    #input-area { background-color: white; padding: 10px; border-top: 1px solid #b3e5fc; display: flex; gap: 8px; align-items: flex-end; }
    textarea { flex: 1; padding: 10px; border: 1px solid #b3e5fc; border-radius: 10px; font-size: 16px; outline: none; resize: none; min-height: 40px; }
    button { padding: 0 15px; background-color: #007bff; color: white; border: none; border-radius: 10px; height: 44px; font-weight: bold; }
    #mic-btn { background-color: #f0f0f0; color: #333; font-size: 20px; width: 50px; }
    #mic-btn.recording { background-color: #ff4d4d; color: white; }
  </style>
</head>
<body>
  <div id="chat-container"></div>
  <div id="input-area">
    <button id="mic-btn">🎤</button>
    <textarea id="user-input" placeholder="入力..." rows="1"></textarea>
    <button id="send-btn" onclick="send()">送信</button>
  </div>

  <script>
    const input = document.getElementById('user-input');
    const micBtn = document.getElementById('mic-btn');
    const sendBtn = document.getElementById('send-btn');
    
    // ★ここにGASでコピーした「/exec」で終わるURLを貼り付けてください
    const gasUrl = "https://script.google.com/macros/s/AKfycbx683xnPVYsTO-Rt55vk8HXGWaa5DgMnDpLmiDfg72xEmNrNal4EIqXGKx5kLRRG7Ab/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    micBtn.addEventListener('click', () => {
      if (!SpeechRecognition) return alert("未対応ブラウザです");
      if (recognition) { recognition.stop(); return; }
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.onstart = () => micBtn.classList.add('recording');
      recognition.onend = () => { micBtn.classList.remove('recording'); recognition = null; };
      recognition.onresult = (e) => { input.value = e.results[0][0].transcript; send(); };
      recognition.start();
    });

    function speak(text) {
      window.speechSynthesis.cancel();
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = 'ja-JP';
      window.speechSynthesis.speak(uttr);
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg || sendBtn.disabled) return;
      sendBtn.disabled = true;
      appendMessage('user-msg', msg);
      input.value = '';

      try {
        const response = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify({ message: msg })
        });
        const data = await response.json();
        appendMessage('ai-msg', data.reply);
        speak(data.reply);
      } catch (e) {
        appendMessage('ai-msg', "通信エラーが発生しました");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function appendMessage(className, text) {
      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = 'message ' + className;
      div.innerText = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  </script>
</body>
</html>
